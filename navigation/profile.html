---
layout: default
title: My Profile
hide: true
show_reading_time: false
---

<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/profile.css">

<div id="pwc-auth-gate" class="pwc-gate">
  <div class="pwc-gate-card">
    <div class="pwc-gate-icon">🔒</div>
    <h2>Member Area</h2>
    <p>Please log in to view your profile.</p>
    <a href="{{ site.baseurl }}/navigation/login" class="pwc-btn pwc-btn-fill">Go to Login</a>
  </div>
</div>

<div id="pwc-profile-app" class="pwc-profile-wrap" style="display:none;">

  <!-- Sidebar -->
  <aside class="pwc-sidebar">
    <div class="pwc-avatar-ring">
      <div class="pwc-avatar" id="avatarInitials">—</div>
    </div>
    <div class="pwc-sidebar-name" id="sidebarName">Loading…</div>
    <div class="pwc-sidebar-email" id="sidebarEmail"></div>

    <nav class="pwc-sidenav">
      <button class="pwc-sidenav-btn active" data-tab="overview">Overview</button>
      <button class="pwc-sidenav-btn" data-tab="edit">Edit Profile</button>
      <button class="pwc-sidenav-btn" data-tab="security">Security</button>
    </nav>

    <button class="pwc-logout-btn" id="logoutBtn">Sign Out</button>
  </aside>

  <!-- Main content -->
  <main class="pwc-main">

    <!-- OVERVIEW TAB -->
    <section class="pwc-tab active" id="tab-overview">
      <div class="pwc-tab-header">
        <h1>My Profile</h1>
        <hr class="pwc-rule">
      </div>

      <div class="pwc-overview-grid">
        <div class="pwc-info-card">
          <span class="pwc-info-label">Full Name</span>
          <span class="pwc-info-value" id="ov-name">—</span>
        </div>
        <div class="pwc-info-card">
          <span class="pwc-info-label">Email</span>
          <span class="pwc-info-value" id="ov-email">—</span>
        </div>
        <div class="pwc-info-card pwc-info-card--wide">
          <span class="pwc-info-label">Bio</span>
          <span class="pwc-info-value" id="ov-bio">—</span>
        </div>
        <div class="pwc-info-card">
          <span class="pwc-info-label">Languages Spoken</span>
          <div class="pwc-tag-list" id="ov-languages"></div>
        </div>
        <div class="pwc-info-card">
          <span class="pwc-info-label">Interests</span>
          <div class="pwc-tag-list" id="ov-interests"></div>
        </div>
      </div>
    </section>

    <!-- EDIT TAB -->
    <section class="pwc-tab" id="tab-edit">
      <div class="pwc-tab-header">
        <h1>Edit Profile</h1>
        <hr class="pwc-rule">
      </div>

      <form class="pwc-form" id="profileForm" onsubmit="return false;">
        <div class="pwc-form-row">
          <div class="pwc-form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" placeholder="Jane" autocomplete="given-name">
          </div>
          <div class="pwc-form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" placeholder="Doe" autocomplete="family-name">
          </div>
        </div>

        <div class="pwc-form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="jane@example.com" autocomplete="email">
        </div>

        <div class="pwc-form-group">
          <label for="bio">Bio</label>
          <textarea id="bio" rows="4" placeholder="Tell your fellow members a little about yourself…"></textarea>
        </div>

        <div class="pwc-form-group">
          <label>Languages Spoken</label>
          <div class="pwc-tag-input-wrap">
            <div class="pwc-tag-chips" id="langChips"></div>
            <input type="text" id="langInput" class="pwc-tag-input" placeholder="Type a language and press Enter">
          </div>
        </div>

        <div class="pwc-form-group">
          <label>Interests</label>
          <div class="pwc-tag-input-wrap">
            <div class="pwc-tag-chips" id="interestChips"></div>
            <input type="text" id="interestInput" class="pwc-tag-input" placeholder="Type an interest and press Enter">
          </div>
        </div>

        <div class="pwc-form-actions">
          <span class="pwc-save-msg" id="saveMsg"></span>
          <button type="button" class="pwc-btn pwc-btn-fill" id="saveBtn">Save Changes</button>
        </div>
      </form>
    </section>

    <!-- SECURITY TAB -->
    <section class="pwc-tab" id="tab-security">
      <div class="pwc-tab-header">
        <h1>Security</h1>
        <hr class="pwc-rule">
      </div>

      <form class="pwc-form" onsubmit="return false;">
        <div class="pwc-form-group">
          <label for="currentPw">Current Password</label>
          <input type="password" id="currentPw" placeholder="••••••••">
        </div>
        <div class="pwc-form-group">
          <label for="newPw">New Password</label>
          <input type="password" id="newPw" placeholder="••••••••">
        </div>
        <div class="pwc-form-group">
          <label for="confirmPw">Confirm New Password</label>
          <input type="password" id="confirmPw" placeholder="••••••••">
        </div>
        <div class="pwc-form-actions">
          <span class="pwc-save-msg" id="pwMsg"></span>
          <button type="button" class="pwc-btn pwc-btn-fill" id="changePwBtn">Update Password</button>
        </div>
      </form>
    </section>

  </main>
</div>

<script src="{{ site.baseurl }}/assets/js/profile.js"></script>
